    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fff;
            color: #000;
            font-size: 13px;
            overflow-x: hidden
        }

        /* ═══════════════ NAV ═══════════════ */
        #nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            z-index: 900;
        }

        #logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #000;
            text-decoration: none;
            border: 2.5px solid #000;
            padding: 1px 8px 2px;
            margin: 0 20px;
            flex-shrink: 0;
            line-height: 1.1;
        }

        #nav-tabs {
            display: flex;
            align-items: center;
            flex: 1;
            justify-content: center
        }

        .ntab {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #999;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 28px;
            height: 44px;
            white-space: nowrap;
            transition: color .15s;
        }

        .ntab:hover {
            color: #000
        }

        .ntab.active {
            color: #000;
            font-weight: 600
        }

        .ntab.active::before {
            content: '■ ';
            font-size: 7px;
            vertical-align: 1px
        }

        #nav-right {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-right: 20px;
            flex-shrink: 0
        }

        .nav-srch {
            display: flex;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            color: #bbb;
            padding: 4px;
            transition: color .15s
        }

        .nav-srch:hover {
            color: #000
        }

        #nav-word {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #bbb
        }

        /* ═══════════════ SUB NAV ═══════════════ */
        #subnav {
            position: fixed;
            top: 44px;
            left: 0;
            right: 0;
            height: 36px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            z-index: 899;
            overflow-x: auto;
            scrollbar-width: none;
            padding-left: 0;
        }

        #subnav::-webkit-scrollbar {
            display: none
        }

        /* subnav items aligned to match where image starts = left panel width */
        .stab {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.01em;
            color: #bbb;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 16px;
            height: 36px;
            white-space: nowrap;
            transition: color .12s;
            flex-shrink: 0;
        }

        .stab:hover {
            color: #000
        }

        .stab.active {
            color: #000;
            font-weight: 500
        }

        /* ═══════════════ MAIN ═══════════════ */
        #main {
            margin-top: 80px
        }

        /* ═══════════════ PROJECT BLOCK ═══════════════ */
        .pblock {
            border-bottom: 1px solid #e5e5e5;
            position: relative
        }

        /* ─── COLLAPSED ROW ─── */
        .prow {
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            transition: background .12s;
            position: relative;
        }

        .prow:not(.open):hover {
            background: #fafafa
        }

        .prow:not(.open):hover .thumb-img {
            transform: scale(1.04)
        }

        /* Left info column — fixed 560px, right-aligned content */
        .row-left {
            width: 560px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 36px 44px 36px 20px;
            text-align: right;
        }

        .row-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
            display: block;
            margin-bottom: 13px;
            margin-left: auto;
            background: #000;
            padding: 5px;
        }

        .row-title {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1.3;
            margin-bottom: 4px
        }

        .row-loc {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #aaa
        }

        /* Thumbnail — square, sits immediately after left col */
        .row-right {
            flex: 1;
            padding: 24px 0 24px 0;
            display: flex;
            align-items: flex-start;
        }

        .thumb-wrap {
            width: 390px;
            height: 390px;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            transition: transform .5s cubic-bezier(.25, .46, .45, .94);
        }

        .thumb-ph {
            width: 100%;
            height: 100%;
            display: block
        }

        /* ─── EXPANDED STATE ─── */
        /* The expanded view replaces the row content entirely */
        .prow.open {
            cursor: default;
            flex-direction: row;
            align-items: stretch;
            min-height: 0;
        }

        /* Sidebar (left, ~300px, right-aligned text) */
        .exp-sidebar {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            padding: 36px 32px 36px 16px;
            border-right: 1px solid #e5e5e5;
            overflow-y: auto;
            scrollbar-width: none;
        }

            display: none
        }

        .exp-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
            display: block;
            margin-bottom: 16px;
            margin-left: auto;
            background: #000;
            padding: 7px;

            font-size: 18px;
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 4px
        }

        .exp-loc {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 28px
        }

        .exp-year {
            font-size: 12px;
            color: #000;
            margin-bottom: 24px
        }

        .exp-meta {
            margin-bottom: 16px
        }

        .exp-meta-lbl {
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 2px
        }

        .exp-meta-val {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1.3
        }

        .exp-share-lbl {
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #aaa;
            margin-top: auto;
            padding-top: 20px;
            margin-bottom: 8px
        }

        .exp-share {
            display: flex;
            gap: 5px;
            justify-content: flex-end
        }

        .exp-share a {
            width: 24px;
            height: 24px;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            color: #000;
            text-decoration: none;
            transition: background .12s, color .12s;
        }

        .exp-share a:hover {
            background: #000;
            color: #fff
        }

        /* Horizontal scroll zone */
        .exp-scroll {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            cursor: grab;
            position: relative;
        }

        .exp-scroll:active {
            cursor: grabbing
        }

        .exp-scroll::-webkit-scrollbar {
            display: none
        }

        .exp-track {
            display: inline-flex;
            align-items: stretch;
            height: 100%;
            min-width: 100%;
        }

        /* Image panel inside scroll */
        .ep-img {
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            height: 100%;
        }

        .ep-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block
        }

        .ep-img-ph {
            width: 100%;
            height: 100%;
            display: block
        }

        /* Text panel inside scroll */
        .ep-txt {
            flex-shrink: 0;
            width: 360px;
            padding: 36px 44px 36px 44px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
            scrollbar-width: none;
            background: #fff;
        }

        .ep-txt::-webkit-scrollbar {
            display: none
        }

        .ep-txt p {
            font-size: 13px;
            font-weight: 300;
            line-height: 1.85;
            color: #111
        }

        .ep-txt p+p {
            margin-top: 1.4em
        }
    </style>
</head>

            const sp = document.createElement('div');
            sp.style.cssText = 'width:560px;flex-shrink:0';
            sn.appendChild(sp);
            DATA[activeCat].subs.forEach(s => {
                const b = document.createElement('button');
                b.className = 'stab' + (activeSub === s ? ' active' : '');
                b.textContent = s;
                b.onclick = () => {
                    activeSub = s; openId = null;
                    document.querySelectorAll('.stab').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    buildList();
                };
                sn.appendChild(b);
            });
        }

        /* ── list ── */
        function buildList() {
            const main = document.getElementById('main');
            main.innerHTML = '';
            const projs = DATA[activeCat].projects.filter(p => activeSub === 'all' || p.sub === activeSub);
            projs.forEach((p, i) => main.appendChild(makeBlock(p, i)));
        }

        function makeBlock(p, idx) {
            const block = document.createElement('div');
            block.className = 'pblock';
            block.id = 'block-' + p.id;
            block.appendChild(makeCollapsedRow(p, idx));
            return block;
        }

        function makeCollapsedRow(p, idx) {
            const row = document.createElement('div');
            row.className = 'prow';
            row.id = 'row-' + p.id;

            // left info
            const left = document.createElement('div');
            left.className = 'row-left';
            const ic = mkImg(p.icon, p.title, 'row-icon');
            const tt = mk('div', 'row-title', p.title);
            const ll = mk('div', 'row-loc', p.loc.toUpperCase());
            left.appendChild(ic); left.appendChild(tt); left.appendChild(ll);

            // right thumbnail
            const right = document.createElement('div');
            right.className = 'row-right';
            const tw = document.createElement('div');
            tw.className = 'thumb-wrap';
            tw.id = 'tw-' + p.id;
            if (p.imgs[0]) {
                const img = mkImg(p.imgs[0], p.title, 'thumb-img');
                img.loading = 'lazy';
                img.onerror = () => { tw.innerHTML = ''; addPh(tw, idx) };
                tw.appendChild(img);
            } else { addPh(tw, idx); }
            right.appendChild(tw);

            row.appendChild(left); row.appendChild(right);

            row.addEventListener('click', () => {
                if (row.classList.contains('open')) return;
                openProject(p, idx, row);
            });
            return row;
        }

        function addPh(el, idx) {
            const ph = document.createElement('div');
            ph.className = 'thumb-ph';
            ph.style.background = PH[idx % PH.length];
            el.appendChild(ph);
        }

        function mk(tag, cls, txt) {
            const el = document.createElement(tag);
            el.className = cls;
            if (txt) el.textContent = txt;
            return el;
        }
        function mkImg(src, alt, cls) {
            const img = document.createElement('img');
            img.src = src; img.alt = alt; img.className = cls;
            img.onerror = () => { img.style.opacity = 0 };
            return img;
        }

        /* ── open / close ── */
        function openProject(p, idx, row) {
            if (openId && openId !== p.id) closeProject(openId);
            openId = p.id;

            // Expanded height = ~590px (matches video — image fills this height comfortably)
            const H = 590;

            row.innerHTML = '';
            row.classList.add('open');
            row.style.height = H + 'px';

            /* Sidebar */
            const sb = document.createElement('div');
            sb.className = 'exp-sidebar';
            sb.style.height = H + 'px';
            sb.innerHTML = `
    <img class="exp-icon" src="${p.icon}" alt="${p.title}" onerror="this.style.opacity=0">
    <div class="exp-title">${p.title}</div>
    <div class="exp-loc">${p.loc.toUpperCase()}</div>
    ${p.year ? `<div class="exp-year">${p.year}</div>` : ''}
    ${p.client ? `<div class="exp-meta"><div class="exp-meta-lbl">Client</div><div class="exp-meta-val">${p.client.toUpperCase()}</div></div>` : ''}
    <div class="exp-meta"><div class="exp-meta-lbl">Typology</div><div class="exp-meta-val">${(p.typology || p.sub).toUpperCase()}</div></div>
    ${p.size ? `<div class="exp-meta"><div class="exp-meta-lbl">Size M2/FT2</div><div class="exp-meta-val">${p.size}</div></div>` : ''}
    <div class="exp-meta"><div class="exp-meta-lbl">Status</div><div class="exp-meta-val">${p.status.toUpperCase()}</div></div>
    <div class="exp-share-lbl">Share</div>
    <div class="exp-share"><a href="#">✉</a><a href="#">f</a><a href="#">in</a><a href="#">𝕏</a></div>
  `;
            row.appendChild(sb);

            /* Horizontal scroll zone */
            const hs = document.createElement('div');
            hs.className = 'exp-scroll';
            hs.style.height = H + 'px';

            const track = document.createElement('div');
            track.className = 'exp-track';

            // Build panels: img → text → img → text ...
            const imgs = p.imgs || [];
            const texts = p.texts || [];
            const count = Math.max(imgs.length, texts.length, 1);

            for (let i = 0; i < count; i++) {
                // Image panel — width chosen so it looks like ~55% of viewport at 1440px
                const imgW = Math.round(H * 1.44); // 16:10 approx
                const ip = document.createElement('div');
                ip.className = 'ep-img';
                ip.style.width = imgW + 'px';
                ip.style.height = H + 'px';
                if (imgs[i]) {
                    const img = document.createElement('img');
                    img.src = imgs[i]; img.alt = p.title;
                    img.onerror = () => { ip.innerHTML = ''; const ph = document.createElement('div'); ph.className = 'ep-img-ph'; ph.style.cssText = `width:100%;height:100%;background:${PH[(idx + i) % PH.length]}`; ip.appendChild(ph) };
                    ip.appendChild(img);
                } else {
                    const ph = document.createElement('div');
                    ph.className = 'ep-img-ph';
                    ph.style.cssText = `width:100%;height:100%;background:${PH[(idx + i) % PH.length]}`;
                    ip.appendChild(ph);
                }
                track.appendChild(ip);

                // Text panel
                if (texts[i]) {
                    const tp = document.createElement('div');
                    tp.className = 'ep-txt';
                    tp.style.height = H + 'px';
                    texts[i].split('\n').forEach(t => { const para = document.createElement('p'); para.textContent = t; tp.appendChild(para); });
                    track.appendChild(tp);
                }
            }

            hs.appendChild(track);
            row.appendChild(hs);

            // Drag scroll
            let drag = false, sx = 0, sl = 0;
            hs.addEventListener('mousedown', e => { drag = true; sx = e.clientX; sl = hs.scrollLeft; hs.style.userSelect = 'none' });
            document.addEventListener('mouseup', () => { drag = false; hs.style.userSelect = '' });
            hs.addEventListener('mousemove', e => { if (!drag) return; e.preventDefault(); hs.scrollLeft = sl - (e.clientX - sx) * 1.1 });
            hs.addEventListener('click', e => { if (Math.abs(hs.scrollLeft - sl) > 5) e.stopPropagation() });

            // Scroll into view — align top of expanded row with top of visible area
            setTimeout(() => row.scrollIntoView({ behavior: 'smooth', block: 'start' }), 30);
        }

        function closeProject(id) {
            const row = document.getElementById('row-' + id);
            if (!row || !row.classList.contains('open')) return;
            row.classList.remove('open');
            row.style.height = '';
            row.innerHTML = '';
            const projs = DATA[activeCat].projects.filter(p => activeSub === 'all' || p.sub === activeSub);
            const idx = projs.findIndex(p => p.id === id);
            if (idx < 0) { if (openId === id) openId = null; return; }
            const p = projs[idx];
            // rebuild collapsed
            const left = document.createElement('div'); left.className = 'row-left';
            const ic = mkImg(p.icon, p.title, 'row-icon');
            const tt = mk('div', 'row-title', p.title);
            const ll = mk('div', 'row-loc', p.loc.toUpperCase());
            left.appendChild(ic); left.appendChild(tt); left.appendChild(ll);
            const right = document.createElement('div'); right.className = 'row-right';
            const tw = document.createElement('div'); tw.className = 'thumb-wrap';
            if (p.imgs[0]) { const img = mkImg(p.imgs[0], p.title, 'thumb-img'); img.loading = 'lazy'; img.onerror = () => { tw.innerHTML = ''; addPh(tw, idx) }; tw.appendChild(img); }
            else addPh(tw, idx);
            right.appendChild(tw);
            row.appendChild(left); row.appendChild(right);
            row.addEventListener('click', () => { if (row.classList.contains('open')) return; openProject(p, idx, row); });
            if (openId === id) openId = null;
        }

        /* ── nav tabs ── */
        document.querySelectorAll('.ntab').forEach(b => {
            b.addEventListener('click', () => {
                activeCat = b.dataset.cat; activeSub = 'all'; openId = null;
                document.querySelectorAll('.ntab').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                buildSubnav(); buildList();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        document.addEventListener('keydown', e => { if (e.key === 'Escape' && openId) closeProject(openId) });

        buildSubnav();
        buildList();
    </script>
</body>

</html>
